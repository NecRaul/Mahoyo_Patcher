name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run pytest tests

  lint-format:
    name: Check linting and formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"

      - name: Uv lock check
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff lint & import check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check --diff

      - name: Ty type check
        run: uv run ty check

  build-linux-executable:
    name: Build Linux executable
    needs:
      - unit-tests
      - lint-format
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \

          wget -q http://archive.ubuntu.com/ubuntu/pool/main/t/tiff/libtiff5_4.3.0-6ubuntu0.13_amd64.deb
          sudo apt install -y \
            ./libtiff5_4.3.0-6ubuntu0.13_amd64.deb \

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Build executable
        run: bash scripts/build_executable.sh

      - name: Upload executable
        uses: actions/upload-artifact@v7.0.0
        with:
          name: linux-executable
          path: dist/*

  build-windows-executable:
    name: Build Windows executable
    needs:
      - unit-tests
      - lint-format
    if: github.ref_type == 'tag'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Build executable
        run: scripts\build_executable.bat

      - name: Upload executable
        uses: actions/upload-artifact@v7.0.0
        with:
          name: windows-executable
          path: dist\*

  gh-release:
    name: Create GitHub Release
    needs:
      - build-linux-executable
      - build-windows-executable
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Mahoyo Patcher ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/**
